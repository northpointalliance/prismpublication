services:
  postgres:
    image: postgres:16-alpine
    container_name: aiads-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiads
      POSTGRES_USER: aiads
      POSTGRES_PASSWORD: aiads_local_dev
    ports:
      - "5432:5432"
    volumes:
      - aiads_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiads -d aiads"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aiads_postgres_data:
